{% extends "base.html" %}

{% block content %}
<div class="project-page-container">
    <div>
        <h1 class="project-title">{{ page.title }}</h1>
        <p>{{ page.content | safe }}</p>
    </div>
    <div>
        <img class="project-image" src="{{ get_url(path=page.extra.image_url) }}" alt="{{ page.extra.image_alt }}">
        <a href="{{ page.extra.link | safe }}" class="project-link text-3">Link here</a>
    </div>

</div>
<!-- <p class="subtitle"><strong>{{ page.date }}</strong></p> -->
{% endblock content %}
