<!DOCTYPE html>
<html lang="en">

<head>

	<link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
</head>

<body class="bg-blue-1">
	<div class="sidebar bg-blue-2 spaced hover-border">
        <div>
            <div class="user-card bg-blue-4 spaced hover-border">
                <img src="{{ get_url(path="images/profile.png") }}" class="profile-picture"/>
                <!-- <p class="text-1">Card here ......................</p> -->
                <div class="personal-details">
                    <p class="text-1 my-name">John Good</p>
                    <p class="text-3">he/him</p>
                </div>
                <!-- <p>johngood2718@gmail.com</p> -->
                <br>
                <div class="account-link-parent">
                    <a class="account-link" href="https://github.com/Anonyyymous"><img class="account-image" src="{{ get_url(path="images/github.svg") }}"/></a>

            <p><a href="{{ get_url(path='@/experience/_index.md') }}" class="site-link bg-blue-6">My experience</a></p>

        <div class="copyright-parent">
            <div class="copyright bg-blue-4 hover-border">
                <p>© 2026 John Good. <br>All Rights Reserved.</p>
            </div>
        </div>
	</div>
	<section class="section main bg-blue-2 spaced hover-border">
		<div class="container">
			{% block content %} {% endblock content %}
		</div>
	</section>
</body>

</html>
